<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Golden Engine Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- The theme (this makes it look like Psych's wiki) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    /* Adding a little Golden flair to the sidebar */
    :root {
      --theme-color: #FFD700; /* Golden Yellow */
    }
  </style>
</head>
<body>
  <div id="app">Loading the Eyesores...</div>
  <script>
    window.$docsify = {
      name: 'Golden Engine Wiki',
      repo: 'https://github.com', // CHANGE THIS TO YOUR REPO LINK
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: 'auto', // Adds a search bar
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
